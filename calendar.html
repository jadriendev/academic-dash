<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="font.css">
    <link rel="shortcut icon" href="https://www.arellano.edu.ph/sites/default/files/inline-images/new-au-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Calendar | Academic Dash</title>
</head>
<body class="flex min-h-screen flex-col lg:flex-row">
    <header class="lg:hidden bg-[#1F1F50] text-white sticky top-0 flex items-center justify-between gap-3 px-4 py-3">
        <div class="flex items-center gap-3">
            <button id="menuBtn">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>
            <div class="">
                <h1 style="font-family: 'Averia Serif Libre';" class="capitalize text-xl tracking-wide">academic dash</h1>
            </div>
        </div>

        <div class="">
            <img src="https://www.arellano.edu.ph/sites/default/files/inline-images/new-au-logo.png" width="37">
        </div>
    </header>

    <aside id="sidebar" class="fixed lg:static top-0 left-0 w-full lg:w-[350px] md:w-full min-h-screen flex flex-col bg-[#101828] transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out z-50">
        <div class="w-full flex justify-start p-3 lg:hidden border-b">
            <button id="closeSidebar" class="text-white text-3xl">
                &times;
            </button>
        </div>
        <div class="bg-[#1F1F50] p-3 flex items-center justify-center gap-3 hidden lg:flex">
            <img src="https://www.arellano.edu.ph/sites/default/files/inline-images/new-au-logo.png" width="60px">
            <h1 style="font-family: 'Averia Serif Libre';" class="capitalize text-white text-2xl tracking-wide">academic dash</h1>
        </div>

        <div class="flex-1 flex flex-col items-center gap-3 p-3 w-full overflow-y-hidden lg:overflow-y-auto">
            <a href="homepage.html" class="relative flex items-center justify-center w-48 py-2 px-8 border-2 rounded-[30px] transition transform duration-300 hover:bg-gray-700 hover:opacity-80">
                <i class="fa-solid fa-table-cells-large text-white text-xl absolute left-4"></i>
                <h3 style="font-family: 'Barlow';" class="text-white tracking-wide capitalize w-full text-center">dashboard</h3>
            </a>

            <a href="task.html" class="relative flex items-center justify-center w-48 py-2 px-8 border-2 rounded-[30px] transition transform duration-300 hover:bg-gray-700 hover:opacity-80">
                <i class="fa-regular fa-clipboard text-white text-xl absolute left-4"></i>
                <h3 style="font-family: 'Barlow';" class="text-white tracking-wide capitalize w-full text-center">task</h3>
            </a>

            <h1 style="font-family: 'Barlow';" class="w-full text-left text-white text-lg capitalize mt-3">general</h1>

            <a href="course.html" class="relative flex items-center justify-center w-48 py-2 px-8 border-2 rounded-[30px] transition transform duration-300 hover:bg-gray-700 hover:opacity-80">
                <i class="fa-solid fa-folder text-white text-xl absolute left-4"></i>
                <h3 style="font-family: 'Barlow';" class="text-white tracking-wide capitalize w-full text-center">course</h3>
            </a>

            <a href="profile.html" class="relative flex items-center justify-center w-48 py-2 px-8 border-2 rounded-[30px] transition transform duration-300 hover:bg-gray-700 hover:opacity-80">
                <i class="fa-regular fa-user-circle text-white text-xl absolute left-4"></i>
                <h3 style="font-family: 'Barlow';" class="text-white tracking-wide capitalize w-full text-center">profile</h3>
            </a>

            <a href="calendar.html" class="relative flex items-center justify-center w-48 py-2 px-8 border-2 rounded-[30px] bg-gray-700 opacity-80">
                <i class="fa-regular fa-calendar text-white text-xl absolute left-4"></i>
                <h3 style="font-family: 'Barlow';" class="text-white tracking-wide capitalize w-full text-center">calendar</h3>
            </a>

            <h1 style="font-family: 'Barlow';" class="w-full text-left text-white text-lg capitalize mt-3">others</h1>

            <a href="news.html" class="relative flex items-center justify-center w-48 py-2 px-8 border-2 rounded-[30px] transition transform duration-300 hover:bg-gray-700 hover:opacity-80">
                <i class="fa-solid fa-newspaper text-white text-xl absolute left-4"></i>
                <h3 style="font-family: 'Barlow';" class="text-white tracking-wide capitalize w-full text-center">news</h3>
            </a>

            <a href="index.html" class="relative flex items-center justify-center w-48 py-2 px-8 bg-red-600 rounded-[30px] transition transform duration-300 hover:bg-red-700 hover:opacity-80 mx-auto mb-3">
                <i class="fa-solid fa-right-from-bracket text-white text-xl absolute left-4"></i>
                <h3 style="font-family: 'Barlow';" class="text-white tracking-wide capitalize w-full text-center">logout</h3>
            </a>
        </div>
    </aside>

    <main class="flex-1 min-h-screen p-5 md:p-10 overflow-x-hidden">
        <h1 style="font-family: 'Barlow';" class="text-4xl font-bold capitalize tracking-wide mb-8">calendar</h1>
        <section class="flex flex-col lg:flex-row gap-6">
            <div class="bg-gray-100 w-full lg:w-[65%] rounded-xl shadow-md p-6">
                <div class="flex justify-between items-center mb-4">
                    <button id="prevMonth">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>

                    <div class="flex gap-2">
                        <select id="monthSelect" class="bg-gray-200 px-3 py-1 rounded"></select>
                        <select id="yearSelect" class="bg-gray-200 px-3 py-1 rounded"></select>
                    </div>

                    <button id="nextMonth">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>

                <div class="grid grid-cols-7 text-center text-sm text-gray-500 mb-3">
                    <span>Su</span>
                    <span>Mo</span>
                    <span>Tu</span>
                    <span>We</span>
                    <span>Th</span>
                    <span>Fr</span>
                    <span>Sa</span>
                </div>

                <div id="calendarDates" class="grid grid-cols-7 text-center gap-y-3 text-sm"></div>
            </div>

            <div class="bg-gray-100 w-full lg:w-[30%] rounded-xl shadow-md">
                <div class="border-b px-5 py-3 font-bold text-lg">
                    Announcements
                </div>

                <div class="p-5 text-gray-500 text-sm">
                    No announcements yet.
                </div>
            </div>
        </section>

        <section class="mt-8">
            <div class="bg-gray-100 rounded-xl shadow-md p-6">
                <h2 class="font-bold text-lg mb-4">Academic roadmap</h2>

                <div class="h-[200px] bg-gray-200 rounded-lg flex items-center justify-center text-gray-400">
                    roadmap content here
                </div>
            </div>
        </section>
    </main>
</body>
<script src="script.js"></script>
</html>
