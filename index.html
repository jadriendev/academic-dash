<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Quattrocento:wght@400;700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="shortcut icon" href="https://www.arellano.edu.ph/sites/default/files/inline-images/new-au-logo.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login | Academic Dash</title>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans px-4">
    <main class="bg-white rounded-2xl border-2 border-black shadow-2xl py-16 px-6 sm:px-8 w-full max-w-md flex flex-col gap-6">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-gray-800">Academic Dash</h1>
            <p class="text-gray-500 text-sm">Enter your credentials to access your account</p>
        </div>

        <form action="homepage.html" class="flex flex-col gap-4">

            <div class="relative">
                <i class="fa-solid fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" name="txtusername" placeholder="Username" class="pl-10 p-3 border border-gray-300 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="relative">
                <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="password" id="password" name="txtpassword" placeholder="Password" class="pl-10 pr-10 p-3 border border-gray-300 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
                <i class="fas fa-eye-slash absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer" id="togglePassword"></i>
            </div>
            
            <input type="submit" value="Login" class="bg-[#1F1F50] hover:bg-[#2A2A85] text-white font-semibold py-3 rounded-lg transition duration-300 cursor-pointer">
        </form>
    </main>
</body>
<script src="index.js"></script>
</html>
